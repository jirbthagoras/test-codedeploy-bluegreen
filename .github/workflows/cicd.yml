name: Deploy to EC2 via CodeDeploy (Blue/Green)

on:
  push:
    branches:
      - main   # Trigger otomatis saat push ke branch main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout kode dari repository ──────────────────────────────────
      - name: Checkout kode
        uses: actions/checkout@v4

      # ── 2. Konfigurasi AWS credentials (Learner Lab pakai session token) ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Zip semua file & upload ke S3 ──────────────────────────────────
      - name: Zip artifact & upload ke S3
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "README*"

          aws s3 cp deploy.zip s3://${{ secrets.S3_BUCKET }}/releases/deploy-${{ github.sha }}.zip

          # Juga simpan sebagai 'latest' untuk kemudahan
          aws s3 cp deploy.zip s3://${{ secrets.S3_BUCKET }}/deploy.zip

          echo "✅ Artifact berhasil diupload ke S3"

      # ── 4. Trigger deployment di CodeDeploy ───────────────────────────────
      - name: Trigger CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ secrets.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ secrets.CODEDEPLOY_GROUP }} \
            --s3-location bucket=${{ secrets.S3_BUCKET }},bundleType=zip,key=deploy.zip \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --description "Deploy dari GitHub Actions | Commit: ${{ github.sha }} | Branch: ${{ github.ref_name }}" \
            --query 'deploymentId' \
            --output text)

          echo "🚀 Deployment dimulai: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      # ── 5. Tunggu hingga deployment selesai ───────────────────────────────
      - name: Tunggu deployment selesai
        run: |
          echo "⏳ Menunggu deployment ${{ env.DEPLOYMENT_ID }} selesai..."

          aws deploy wait deployment-successful \
            --deployment-id ${{ env.DEPLOYMENT_ID }}

          echo "✅ Deployment berhasil!"

      # ── 6. Tampilkan status akhir ──────────────────────────────────────────
      - name: Tampilkan info deployment
        if: always()
        run: |
          aws deploy get-deployment \
            --deployment-id ${{ env.DEPLOYMENT_ID }} \
            --query 'deploymentInfo.{Status:status,Created:createTime,Completed:completeTime}' \
            --output table
